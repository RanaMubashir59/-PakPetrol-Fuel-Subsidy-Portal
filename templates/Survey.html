{% extends 'base.html' %}
{% block title %}Survey — PakPetrol{% endblock %}

{% block content %}
<div class="auth-container" style="padding:2rem 1rem;">
  <div class="auth-box" style="max-width:1040px; margin:0 auto;">
    <div class="auth-header" style="margin-bottom:1.5rem;">
      <div class="logo">📋</div>
      <h2>PakPetrol Survey</h2>
      <p class="subtitle">Please complete the survey below. Your answers will be recorded by Google Forms.</p>
    </div>

    <div style="position:relative;padding-bottom:160%;height:0;overflow:hidden;">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdyaFNnVf9oVioNAPgSsdUWfiqQMMsDSlksrHH1Xsok3NI2jA/viewform?embedded=true"
        width="100%" height="100%" style="position:absolute;top:0;left:0;border:0;"
        frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <p style="margin-top:1rem; color:#334155;">
      If the form does not display, open it directly in a new tab:
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdyaFNnVf9oVioNAPgSsdUWfiqQMMsDSlksrHH1Xsok3NI2jA/viewform?usp=header" target="_blank" rel="noopener noreferrer">Open Survey</a>.
    </p>
  </div>
</div>
{% endblock %}
